<!doctype html>
<html lang="id">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Title & Description -->
    <title>Photobooth App | Capture Momen dengan Filter Kreatif</title>
    <meta
      name="description"
      content="Aplikasi photobooth berbasis web untuk mengambil foto langsung dari kamera dengan berbagai filter kreatif. Cepat, modern, dan tanpa instalasi."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Photobooth App" />
    <meta
      property="og:description"
      content="Ambil foto langsung dari browser dengan filter menarik dan tampilan modern."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/preview.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Security (basic) -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  </head>

  <body>
    <noscript>
      Aplikasi ini membutuhkan JavaScript untuk berjalan dengan baik.
    </noscript>

    <!-- Root App -->
    <div id="root"></div>

    <!-- Entry Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
